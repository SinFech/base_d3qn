data:
  path: data/Bitcoin History 2010-2024.csv
  start_date: "2014-01-01"
  end_date: "2020-12-31"
  price_column: Price
  close_column: Close
  date_column: Date

env:
  reward: sr_enhanced
  window_size: 24
  trading_period: 500
  train_split: 0.8
  action_mode: continuous
  initial_capital: 100000.0
  transaction_cost_bps: 10.0
  slippage_bps: 2.0
  allow_short: false
  max_leverage: 1.0
  action_low: 0.0
  action_high: 1.0
  min_equity_ratio: 0.2
  stop_on_bankruptcy: true
  obs:
    type: signature
    signature:
      backend: pysiglib
      embedding:
        log_price: {}
        log_return: {}
        rolling_vol:
          window: 5
      account_features:
        - cash_ratio
        - position_ratio
        - equity_return
        - last_action
      logsig:
        degree: 3
        method: 1
        time_aug: true
        lead_lag: false
        end_time: 1.0
      torch:
        device: cpu
        dtype: float32
      perf:
        n_jobs: -1
        use_disk_prepare_cache: false
        prepare_cache_dir: data/pysiglib_prepare_cache

ppo:
  hidden_sizes: [256, 256]
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_ratio: 0.2
  update_epochs: 10
  minibatch_size: 128
  value_coef: 0.5
  entropy_coef: 0.01
  max_grad_norm: 0.5
  target_kl: 0.03
  normalize_advantage: true
  action_dim: 1
  init_log_std: -1.0
  deterministic_eval: true

train:
  num_episodes: 200
  max_steps_per_episode:
  max_total_steps:
  log_interval: 10
  checkpoint_interval: 5
  resample_train_window_each_episode: true

eval:
  num_episodes: 50
  seed: 20240101
  fixed_windows: true
  fixed_windows_seed: 20240101
  epsilon: 0.0
  save_per_episode: true

run:
  seed: 42
  device: auto

algo: ppo_continuous

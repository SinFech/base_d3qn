env:
  reward: profit
  window_size: 24
  trading_period: 200
  train_split: 0.8
  obs:
    type: signature
    signature:
      backend: pysiglib
      embedding: price_return
      logsig:
        degree: 2
        method: 1
        time_aug: true
        lead_lag: false
        end_time: 1.0
      torch:
        device: cpu
        dtype: float32
      perf:
        n_jobs: -1
        use_disk_prepare_cache: true
        prepare_cache_dir: data/pysiglib_prepare_cache

model:
  type: mlp_dueling
  hidden_sizes: [256, 256]

train:
  num_episodes: 1
  max_steps_per_episode: 5
  log_interval: 1
  checkpoint_interval: 1

eval:
  num_episodes: 1
  epsilon: 0.0

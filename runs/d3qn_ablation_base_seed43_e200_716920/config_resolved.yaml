data:
  path: data/Bitcoin History 2010-2024.csv
  start_date: '2014-01-01'
  end_date: '2020-12-31'
  price_column: Price
  close_column: Close
  date_column: Date
env:
  reward: sr_enhanced
  window_size: 24
  trading_period: 500
  train_split: 0.8
  max_positions: null
  max_exposure_ratio: 0.8
  sell_mode: all
  buy_fractions:
  - 0.2
  - 0.4
  - 0.6
  - 0.8
  sell_fractions: null
  action_mode: discrete_capital
  initial_capital: 100000.0
  transaction_cost_bps: 10.0
  slippage_bps: 2.0
  invalid_sell_penalty: 0.1
  allow_short: false
  max_leverage: 1.0
  action_low: 0.0
  action_high: 1.0
  min_equity_ratio: 0.2
  stop_on_bankruptcy: true
  obs:
    type: signature
    signature:
      backend: pysiglib
      embedding:
        log_price: {}
        log_return: {}
        rolling_vol:
          window: 5
      rolling_mean_window: 5
      account_features:
      - cash_ratio
      - position_ratio
      - equity_return
      - last_action
      logsig:
        degree: 3
        method: 1
        time_aug: true
        lead_lag: false
        end_time: 1.0
      torch:
        device: cpu
        dtype: float32
      perf:
        n_jobs: -1
        use_disk_prepare_cache: false
        prepare_cache_dir: data/pysiglib_prepare_cache
agent:
  replay_mem_size: 50000
  batch_size: 64
  gamma: 0.99
  eps_start: 1.0
  eps_end: 0.05
  eps_steps: 30000
  learning_rate: 0.00025
  input_dim: 34
  hidden_dim: 120
  action_number: 6
  target_update: 5
  model: ddqn
  double: true
  per_enabled: false
  per_alpha: 0.6
  per_beta_start: 0.4
  per_beta_steps: 100000
  per_eps: 1.0e-06
  n_step: 1
train:
  num_episodes: 200
  max_steps_per_episode: null
  max_total_steps: 75200
  log_interval: 10
  checkpoint_interval: 5
  eval_epsilon: 0.0
  resample_train_window_each_episode: true
  eval_interval: 0
  eval_episodes: 50
  eval_seed: 20240101
  plateau_threshold: 0.01
  plateau_patience: 5
eval:
  num_episodes: 50
  seed: 20240101
  fixed_windows: true
  fixed_windows_seed: 20240101
  epsilon: 0.0
  save_per_episode: true
run:
  seed: 43
  device: auto
model:
  type: conv_dueling
  hidden_sizes:
  - 256
  - 256
